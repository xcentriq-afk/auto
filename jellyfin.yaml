services:
  jellyfin:
    image: ghcr.io/linuxserver/jellyfin
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
    volumes:
      - '/home/xc/.config/Jellyfin:/config'
      - '/media/usb3/Seriale:/tv'
      - '/media/usb3/Filmy:/movies'
      - '/opt/vc/lib:/opt/vc/lib' #optional
    ports:
      - 8096:8096
      - 8920:8920 #optional
      - 7359:7359/udp #optional
      - 1900:1900/udp #optional
    restart: unless-stopped    
